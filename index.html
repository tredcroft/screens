<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screens</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #08080e;
      --surface: #11111b;
      --surface-hover: #181828;
      --border: #1e1e32;
      --text: #e2e2f0;
      --text-muted: #7a7a9a;
      --accent-blue: #4a6cf7;
      --accent-violet: #8b5cf6;
      --accent-gradient: linear-gradient(135deg, #4a6cf7, #8b5cf6);
      --watch: #22c55e;
      --skip: #ef4444;
      --meh: #f59e0b;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      padding: 2rem 1.5rem 1rem;
      max-width: 720px;
      margin: 0 auto;
    }

    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .logo span {
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    header p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      max-width: 720px;
      margin: 0 auto;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.4rem 0.9rem;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--accent-gradient);
      border-color: transparent;
      color: #fff;
    }

    /* show LIST */
    .show-list {
      max-width: 720px;
      margin: 0 auto;
      padding: 0.75rem 1.5rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    /* show CARD */
    .show-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      gap: 1rem;
      padding: 1rem;
      transition: background 0.2s, border-color 0.2s;
      cursor: default;
    }

    .show-card:hover {
      background: var(--surface-hover);
      border-color: #2a2a44;
    }

    .show-poster {
      width: 72px;
      min-width: 72px;
      height: 108px;
      border-radius: 6px;
      background: #1a1a2e;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      flex-shrink: 0;
    }

    .show-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .show-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .show-header {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.15rem;
    }

    .show-title {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .show-year {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .show-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.35rem;
    }

    .show-genre {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .show-verdict {
      font-size: 0.75rem;
      color: #b0b0cc;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* RATING BADGE */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }

    .badge.watch {
      background: rgba(34, 197, 94, 0.12);
      color: var(--watch);
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    .badge.skip {
      background: rgba(239, 68, 68, 0.12);
      color: var(--skip);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .badge.meh {
      background: rgba(245, 158, 11, 0.12);
      color: var(--meh);
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    /* EMPTY STATE */
    .count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      padding: 0 1.5rem;
      max-width: 720px;
      margin: 0 auto;
    }

    /* RESPONSIVE */
    @media (max-width: 480px) {
      header { padding: 1.5rem 1rem 0.75rem; }
      header h1 { font-size: 1.4rem; }
      .filters { padding: 0.5rem 1rem; }
      .show-list { padding: 0.5rem 1rem 3rem; }
      .count { padding: 0 1rem; }
      .show-poster { width: 60px; min-width: 60px; height: 90px; }
      .show-title { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo"><span>Screens</span></div>
    <h1>Watch. Maybe. Skip.</h1>
    <p>Screen picks — short, honest, no fluff.</p>
    <p>Currently watching: Cape Fear (S1), Widows Bay (S1), Sugar (S2)</p>
  </header>

  <div class="filters">
   
    <button class="filter-btn" onclick="filtershows('watch')">👍 watch</button>
    <button class="filter-btn" onclick="filtershows('meh')">🤷 meh</button>
    <button class="filter-btn" onclick="filtershows('skip')">👎 skip</button>
  
  </div>

  <div class="count" id="count"></div>
  <div class="show-list" id="showList"></div>

  <script>
    // ============================================================
    //  show DATABASE — edit here to add/remove/change shows
    //  rating: "watch" (it's good), "meh" (50:50), "skip" (don't bother)
    //  poster: emoji fallback — replace with real image URLs if you want
    // ============================================================
    const shows = [
      {
        title: "I Will Find You (Mini)",
        year: 2026,
        genre: "Thriller, Drama",
        rating: "watch",
        verdict: "Engaging, good characters and actors, easy binge.",
        posterUrl: "https://www.whats-on-netflix.com/wp-content/uploads/2025/03/poster-I-wil-find-you-harlan-coben-netflix-june-2026.jpg.webp"
      },
      {
        title: "Scarpetta (S1)",
        year: 2026,
        genre: "Thriller, Mystery",
        rating: "watch",
        verdict: "Great cast, mysterious story, two timelines.",
        posterUrl: "https://image.tmdb.org/t/p/w1280/sRhrsxRlxQZyeBb9laFHdnoWaR3.jpg"
      },
      {
        title: "Taste For Murder (S1)",
        year: 2026,
        genre: "Mystery, Crime, Drama, Family",
        rating: "watch",
        verdict: "Set on beautiful Capri Island, a British cop and his daughter try to get a grip on life after a tragedy. Crimes, secrets, family.",
        posterUrl: "https://images.theposterdb.com/prod/public/images/posters/optimized/shows/3645566/season_c/zGbov2BKUQIysZ3STRgThDfx3Scvj3O79VlqlpEb.webp"
      },
      {
        title: "Secret Service (S1)",
        year: 2026,
        genre: "Thriller, Crime",
        rating: "meh",
        verdict: "Somewhat slow and full of flaws. But visually engaging and the acting is mostly decent.",
        posterUrl: "https://image.tmdb.org/t/p/original/f7tksyddK3VvismfoWCwpXPqz0x.jpg"
      },
      {
        title: "Small Prophets (S1)",
        year: 2026,
        genre: "Comedy, Drama, Mystery",
        rating: "watch",
        verdict: "While its premise is delightfully bizarre, it is the flawed but lovable characters that keep you hooked.",
        posterUrl: "https://image.tmdb.org/t/p/w1280/dwa5S9efdYhnxMBjUtRdrmlHT5e.jpg"
      },
      {
        title: "Grace (S6)",
        year: 2026,
        genre: "Crime, Drama",
        rating: "meh",
        verdict: "Gets a bit boring sometimes, the overall arch is done with S5 but they still hang on to it.",
        posterUrl: "https://media.themoviedb.org/t/p/w440_and_h660_face/3T2OmZqwbbhw1N6wT7avpY5ZWek.jpg"
      },
      {
        title: "Down Cemetary Road (S1)",
        year: 2025,
        genre: "Crime, Drama, Thriller",
        rating: "watch",
        verdict: "An engaging riddle. Thompson is great as always, though it's not her typical role. ",
        posterUrl: "https://image.tmdb.org/t/p/original/2o0e2ywMg8uEXD8fZRQ9BFlZZJx.jpg"
      },
    ];

    // ============================================================
    //  RENDER LOGIC — no need to touch this
    // ============================================================
    const ratingLabels = { watch: "👍 watch", meh: "🤷 meh", skip: "👎 skip" };

    function rendershows(list) {
      const container = document.getElementById('showList');
      const countEl = document.getElementById('count');
      countEl.textContent = `${list.length} show${list.length !== 1 ? 's' : ''}`;

      container.innerHTML = list.map(f => `
        <div class="show-card" data-rating="${f.rating}" data-genre="${f.genre}">
          <div class="show-poster">
            ${f.posterUrl
              ? `<img src="${f.posterUrl}" alt="${f.title}" loading="lazy">`
              : f.poster || '🎬'}
          </div>
          <div class="show-info">
            <div class="show-header">
              <span class="show-title">${f.title}</span>
              <span class="show-year">${f.year}</span>
            </div>
            <div class="show-meta">
              <span class="badge ${f.rating}">${ratingLabels[f.rating]}</span>
              <span class="show-genre">${f.genre}</span>
            </div>
            <div class="show-verdict">${f.verdict}</div>
          </div>
        </div>
      `).join('');
    }

    function filtershows(filter) {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active',
          btn.textContent.trim().toLowerCase().includes(filter.toLowerCase()) ||
          (filter === 'all' && btn.textContent.trim() === 'All')
        );
      });

      if (filter === 'all') {
        rendershows(shows);
      } else if (['watch', 'meh', 'skip'].includes(filter)) {
        rendershows(shows.filter(f => f.rating === filter));
      } else {
        rendershows(shows.filter(f => f.genre === filter));
      }
    }

    // Initial render
    rendershows(shows);
  </script>

</body>
</html>
